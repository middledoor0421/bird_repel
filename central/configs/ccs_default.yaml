# Central Camera System default config (skeleton)

runtime:
  device: "cuda:0"        # device id or "cpu"
  precision: "fp16"       # "fp32" or "fp16"
  num_workers: 4          # dataloader/decoder threads
  seed: 1337

ingest:
  sources:
    - id: "cam-0"
      uri: "temp_data/test_1.mp4"   # 또는 rtsp://...
      width: 1920
      height: 1080
      fps: 15
    - id: "cam-1"
      uri: "temp_data/test_1.mp4"
      width: 1920
      height: 1080
      fps: 15
    - id: "cam-2"
      uri: "temp_data/test_1.mp4"
      width: 1920
      height: 1080
      fps: 15
    - id: "cam-3"
      uri: "temp_data/test_1.mp4"
      width: 1920
      height: 1080
      fps: 15
  sync:
    enable: true          # sync across cams (timestamp alignment)
    tolerance_ms: 80

roi_gating:
  motion:
    method: "frame_diff"  # "frame_diff" or "bg_subtractor"
    diff_th: 18           # pixel intensity threshold
    min_area: 64          # min moving area in px^2
  tiles:
    enable: true
    tile_size: 640        # candidate tile size for promotion
    overlap: 0.2
  policy:
    promote_on_small: true
    small_area_ratio: 0.002   # if box area < ratio → promote SAHI
    conf_low: 0.2             # if conf < conf_low → promote SAHI

detector:
  backend: "ultralytics"     # 임시 백엔드 식별자
  weights: "yolov8n.pt"      # 또는 yolov10n.pt (사용 가능할 때)
  input_size: 640
  conf_th: 0.15           # low threshold, recall-oriented
  iou_th: 0.6
  nms:
    type: "soft-nms"              # MVP는 일반 NMS로 시작(Soft‑NMS는 다음 단계)
    sigma: 0.5
  scoring:
    iou_aware: false         # VFL 정렬 전까지 false, 나중에 true
  classes:
    only_bird: true

tracker:
  method: "bytetrack"     # "bytetrack" or "ocsort"
  track_buffer: 30
  match_iou_th: 0.3
  conf_th_high: 0.5       # high conf for first stage matching
  conf_th_low: 0.1        # low conf for recovery (ByteTrack)

sahi:
  enable: true            # will be triggered conditionally
  tile_size: 896
  overlap: 0.25
  max_tiles: 6
  postprocess:
    merge_iou: 0.55
    merge_method: "nms"

postprocess:
  min_box_size: 6         # px; discard too-small boxes
  angle_center: [960, 540] # image center (for bearing conversion)
  calibration:
    fov_deg: 90.0         # camera horizontal FOV for angle mapping

event:
  topic: "bird_target"
  emit_conf_th: 0.15
  fields:
    include_meta: true

display:
  enable: true
  scale: 0.5
  multi: "windows"     # "windows" or "grid"
  window_name: "ccs_multi"

metrics:
  interval_sec: 5.0